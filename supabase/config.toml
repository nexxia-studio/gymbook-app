# verify_jwt explicite par fonction (évite une réécriture silencieuse au déploiement).
# Le projet cible est passé via --project-ref au déploiement (pas de project_id couplé ici).

# Webhooks appelés par Mollie (auth = ?secret= dans l'URL, pas de JWT) → JWT désactivé.
[functions.mollie-webhook]
verify_jwt = false

[functions.mollie-subscription-webhook]
verify_jwt = false

# Fonctions appelées en interne par pg_cron / SQL (net.http_post avec
# X-Internal-Secret, sans JWT) → JWT désactivé sinon le gateway renvoie 401.
[functions.notify-waitlist]
verify_jwt = false

[functions.send-reminders]
verify_jwt = false

[functions.send-noshow-notification]
verify_jwt = false

# Endpoints appelés par l'app authentifiée (JWT membre requis).
[functions.create-payment]
verify_jwt = true

[functions.create-subscription]
verify_jwt = true

# GYM-85 — appel gérant authentifié (JWT requis).
[functions.mollie-connect-oauth]
verify_jwt = true

# GYM-46 — suppression de compte in-app (JWT membre requis ; member_id = JWT, jamais body).
[functions.delete-account]
verify_jwt = true
