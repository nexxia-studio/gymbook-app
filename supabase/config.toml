# verify_jwt explicite par fonction (évite une réécriture silencieuse au déploiement).
# Le projet cible est passé via --project-ref au déploiement (pas de project_id couplé ici).

# Webhooks appelés par Mollie (auth = ?secret= dans l'URL, pas de JWT) → JWT désactivé.
[functions.mollie-webhook]
verify_jwt = false

[functions.mollie-subscription-webhook]
verify_jwt = false

# Fonctions appelées en interne par pg_cron / SQL (net.http_post avec
# X-Internal-Secret, sans JWT) → JWT désactivé sinon le gateway renvoie 401.
[functions.notify-waitlist]
verify_jwt = false

[functions.send-reminders]
verify_jwt = false

[functions.send-noshow-notification]
verify_jwt = false

# Endpoints appelés par l'app authentifiée (JWT membre requis).
[functions.create-payment]
verify_jwt = true

[functions.create-subscription]
verify_jwt = true

# GYM-85 — appel gérant authentifié (JWT requis).
[functions.mollie-connect-oauth]
verify_jwt = true

# GYM-46 — suppression de compte in-app (JWT membre requis ; member_id = JWT, jamais body).
[functions.delete-account]
verify_jwt = true

# GYM-144 — création d'un membre au comptoir par le gérant (JWT gym_admin requis ;
# gym_id pris sur le profil de l'appelant, jamais du body).
[functions.admin-create-member]
verify_jwt = true

# GYM-143 — annulation d'un cours par le gérant (JWT gym_admin requis ;
# le slot doit appartenir à la salle de l'appelant, gym_id jamais pris du body).
[functions.cancel-slot]
verify_jwt = true

# GYM-112 — remboursement Mollie par le gérant (JWT gym_admin requis ;
# le paiement doit appartenir à la salle de l'appelant, jamais du body).
[functions.create-refund]
verify_jwt = true

# GYM-129 — édition identité membre par le gérant (JWT gym_admin requis ;
# la cible doit être un membre de la salle de l'appelant, jamais du body).
[functions.admin-update-member]
verify_jwt = true

# GYM-174 — pointage des présences par le gérant (JWT gym_admin requis ;
# la réservation / le membre doivent appartenir à la salle de l'appelant, gym_id jamais du body).
[functions.mark-attendance]
verify_jwt = true
